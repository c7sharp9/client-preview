  :root {

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: var(--font); }
  body {
    padding: 40px 48px 80px;
    border: 1px solid var(--border);
    min-height: 100vh;

  header.sheet-head {

  .sheet-head h1 { margin: 0; font-size: 28px; font-weight: 600; letter-spacing: -0.01em; }
  .sheet-head .meta { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }

  .grid {
    display: grid;
    grid-template-columns: repeat(var(--columns), minmax(0, 1fr));
    gap: var(--gap);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex; flex-direction: column;
    break-inside: avoid;
  }
  .thumb {
    position: relative;
    aspect-ratio: var(--thumb-aspect);
    background: #000 center/cover no-repeat;
    background-color: #000;
  }
  .thumb .duration {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.72); color: #fff;
    font-size: 11px; font-variant-numeric: tabular-nums;
    padding: 2px 6px; border-radius: 4px;
    letter-spacing: 0.02em;
  }
  .caption {
    padding: 10px 12px 12px;
    font-size: 12.5px; line-height: 1.35;
    word-break: break-word;
  }
  .caption .name { color: var(--fg); }
  .caption .sub { color: var(--muted); font-size: 11px; margin-top: 2px; font-variant-numeric: tabular-nums; }

  .sheet-info {
    margin-bottom: 28px; color: var(--muted); font-size: 13px; line-height: 1.6;
  }
  .sheet-info .info-row { margin-bottom: 4px; }
  .sheet-info .info-label { color: var(--fg); font-weight: 500; }
  .sheet-info a { color: var(--accent); text-decoration: none; }
  .sheet-info a:hover { text-decoration: underline; }
  .sheet-info .info-contact { white-space: pre-line; }

  footer.sheet-foot {
    margin-top: 48px; padding-top: 16px; border-top: 1px solid var(--border);
    color: var(--muted); font-size: 11px; display: flex; justify-content: space-between; gap: 16px;
  }

  /* Print / PDF tuning — keep dark theme, tighten grid */
  @media print {
    :root { --columns: 4; --gap: 10px; }
    @page { size: Letter landscape; margin: 0.4in; }
    body { padding: 24px; }
  }

  /* Responsive */
  @media (max-width: 1100px) { :root { --columns: 3; } }
  @media (max-width:  720px) { :root { --columns: 2; } body { padding: 24px; } }

<script>
(function () {
  const data = JSON.parse(document.getElementById("contact-sheet-data").textContent);

  function fmtDuration(s) {
    if (!isFinite(s) || s < 0) return "";
    s = Math.round(s);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    const pad = (n) => String(n).padStart(2, "0");
    return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;
  }

  const totalSeconds = data.videos.reduce((a, v) => a + (v.duration || 0), 0);

  document.title = data.title || document.title;
  document.getElementById("sheet-title").textContent = data.title || "Video Contact Sheet";
  document.getElementById("sheet-count").textContent = `${data.videos.length} video${data.videos.length === 1 ? "" : "s"}`;
  document.getElementById("sheet-total").textContent = totalSeconds ? `total ${fmtDuration(totalSeconds)}` : "";
  document.getElementById("sheet-generated").textContent = data.generatedAt ? `generated ${data.generatedAt}` : "";
  document.getElementById("sheet-source").textContent = data.source || "";

  // -- Project info section --
  const infoEl = document.getElementById("sheet-info");
  const infoRows = [];
  if (data.client) infoRows.push(`<div class="info-row"><span class="info-label">Client:</span> ${esc(data.client)}</div>`);
  if (data.url) infoRows.push(`<div class="info-row"><span class="info-label">Video files:</span> <a href="${esc(data.url)}" target="_blank" rel="noopener">${esc(data.url)}</a></div>`);
  if (data.notes) infoRows.push(`<div class="info-row"><span class="info-label">Notes:</span> ${esc(data.notes)}</div>`);
  if (data.contact) infoRows.push(`<div class="info-row"><span class="info-label">Contact:</span><div class="info-contact">${esc(data.contact)}</div></div>`);
  infoEl.innerHTML = infoRows.join("\n");
  if (!infoRows.length) infoEl.style.display = "none";

  function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

  const grid = document.getElementById("sheet");
  const frag = document.createDocumentFragment();
  for (const v of data.videos) {
    const card = document.createElement("article");
    card.className = "card";
    card.innerHTML = `
      <div class="thumb" style="background-image:url('${v.thumb}')">
        ${v.duration ? `<span class="duration">${fmtDuration(v.duration)}</span>` : ""}
      </div>
      <div class="caption">
        <div class="name"></div>
        ${v.subtitle ? `<div class="sub"></div>` : ""}
      </div>`;
    card.querySelector(".name").textContent = v.name;
    if (v.subtitle) card.querySelector(".sub").textContent = v.subtitle;
    frag.appendChild(card);
  }
  grid.appendChild(frag);
})();
</script>
